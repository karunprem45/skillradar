name: Daily ingest

on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC = 6/7am Boston, daily
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest new postings
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python -m src.ingest

      - name: Extract skills (rule-based)
        run: python -m src.extract_rules

      - name: Commit updated database
        run: |
          git config user.name "Karuniya Premnath"
          git config user.email "karunprem45@users.noreply.github.com"
          git add data/skillradar.db
          git diff --cached --quiet || git commit -m "Daily data update"
          git push
