name: Daily ingest

on:
  schedule:
    - cron: "0 5,11,17,23 * * *" # every 6h — near-real-time alerts, Adzuna stays under quota
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest new postings
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python -m src.ingest

      - name: Extract skills (rule-based)
        run: python -m src.extract_rules

      - name: Send new-posting alerts
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python -m src.alerts

      - name: Retrain models on fresh data
        run: |
          python -m src.evaluate
          python -m src.train_salary
          python -m src.cluster_roles

      - name: Commit updated database and model artifacts
        run: |
          git config user.name "Karuniya Premnath"
          git config user.email "karunprem45@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily data update"
          git push
